<!DOCTYPE html>
<html>

<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container mt-5" style="max-width: 480px;">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h4 class="mb-1">Forgot Password</h4>
                <p class="text-muted mb-4">Enter your registered email to receive a reset link.</p>

                {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>
                {% endfor %}
                {% endif %}

                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.email.id_for_label }}" class="form-label">Email Address</label>
                        {{ form.email }}
                        {% if form.email.errors %}
                        <div class="text-danger small mt-1">{{ form.email.errors|join:", " }}</div>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>

                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-muted small">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
