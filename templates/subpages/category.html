{% extends 'base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/category.css' %}">

{% endblock %}
{% block content %}
<!-- Category -->
<section class="category">
  <div class="container">
    <h2 class="category-heading text-center">Products Category</h2>
    <div class="row mt-md-5 category-row">
      {% for car in category %}
      <!-- card start -->
      <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-xl-2 p-1">
        <a href="{% url 'product_by_category' car.id %}">
          <div class="card category-card p-2">
            <div class="cat_ecategory1-card-img d-flex justify-content-center align-items-center py-3">
              {% if car.pic %}
              <img src="{{ car.pic.url }}" alt="{{car.category}}">
              {% endif %}
            </div>
            <div class="card-body">
              <h5 class="category-title m-0">{{car.category}}</h5>
            </div>
          </div>
        </a>
      </div>
      {% endfor %}
      <!-- card end -->

    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}

{% endblock %}
