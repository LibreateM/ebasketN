{% extends 'dashboard/base.html' %}


{% block title %}

Dashboard

{% endblock title %}


{% block content %}

<div class="content">

  <!-- TOPBAR -->
  <div class="topbar">
    <span class="hamburger" onclick="toggleSidebar()">☰</span>
    <h4>Admin Dashboard</h4>
  </div>
  <!-- form -->
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <div class="card shadow-lg border-0">
          <div class="card-header bg-dark text-white text-center">
            <h4 class="mb-0"><i class="bi bi-tags"></i> Add Category <i class="bi bi-tags"></i></h4>
          </div>

          <div class="card-body p-4">
            <form method="POST" enctype="multipart/form-data">

              {% csrf_token %}

              <!-- Category Name -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Enter Category Name</label>
                <input type="text" class="form-control" placeholder="Enter Category Name" name="category" required>
              </div>

              <!-- Category Image -->
              <div class="mb-3">
                <label class="form-label fw-semibold">Category Image</label>
                <input type="file" class="form-control" name="pic">
              </div>

              <!-- Submit Button -->
              <div class="d-grid">
                <button class="btn btn-dark btn-lg" type="submit">
                  Submit
                </button>
              </div>

            </form>
          </div>

        </div>

      </div>
    </div>
  </div>
</div>



{% endblock %}
