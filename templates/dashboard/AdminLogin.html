<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-Basket</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <link rel="icon" href="{% static 'img/logo3.png' %}">
</head>

<body class="body bg-light">
    <!-- Login Form-->
    {% for message in messages %}
    <p style="color:red;"><i class="bi bi-emoji-frown"></i> {{ message }} <i class="bi bi-emoji-frown"></i></p>
    {% endfor %}
    <section class=" py-3 py-md-5 py-xl-8">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5 col-xxl-4">
                    <div class="mb-5">
                        <h4 class="text-center ">Are You Really An Admin?</h4>
                        <h6 class="text-center mb-4">🙄🙄If You Are Prove It🙄🙄</h6>
                    </div>
                    <div class="card border border-light-subtle rounded-4">
                        <div class="card-body p-3 p-md-4 p-xl-5 shadow">
                            <form method="POST">
                                {%csrf_token%}
                                <div class="row gy-3 overflow-hidden">
                                    <div class="col-12">
                                        <div class="form-floating mb-3">
                                            <input type="text" class="form-control" name="admin1" id="user" required>
                                            <label for="user" class="form-label">Admin Name</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="form-floating mb-3">
                                            <input type="password" class="form-control" name="password" id="password"
                                                placeholder="Password" required>
                                            <label for="password" class="form-label">Password</label>
                                        </div>
                                    </div>
                                    <div class="col-12">
                                        <div class="d-grid">
                                            <button class="btn btn-primary btn-lg" type="submit"><i
                                                    class="bi bi-check-circle"></i>&nbsp;Verify</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                        <p class="bg-primary text-light  border shadow-lg text-center fw-bold">If You Are Not An Admin
                            <a href="{%url 'index'%}" class="text-danger">Leave</a> This Section
                        </p>
                        <div>

                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
